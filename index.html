</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Venda seu carro.</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="conteiner">
        <header class="cabecalho">
            <h3>Cadestre seu veiculo para vender mais rapido</h3>
        </header>
        <div class="form-container">
            <div class="form-header"></div>
                <p>Formulário</p>
            <div class="form-body">
                <h1 class="form-titulo">Venda fácil seu carro</h1>
                <p>Descreva as caracteristicas do seu carro e marque os opcionais que ele possui</p>
                <form>
                    <div class="caixaInputs"></div>
                        <label for="title">Titulo do anuncio
                            <span class="campo-obrigatorio">*</span></label>
                            <input type="text" name="title" id="title" class="block" placeholder="Digite seu titulo" minlength="1" maxlength="30" required>
               </div>
                <div class="caixaInputs"></div>
                            <label for="preco">Preço
                                <span class="campo-obrigatorio">*</span></label>
                                <input type="number" name="preco" id="preco" class="block" placeholder="Digite o preço" minlength="1" maxlength="30" required>
                </div>
                <div class="caixaInputs">
                            <label for="descricao">Descrição
                                </label><textarea name="descricao" id="descricao" class="block" placeholder="Digite a descrição do seu carro" minlength="1" maxlength="30" required></textarea>
                </div>
                <div class="caixaInputs"></div>
                            <label for="modelo">Modelo
                                <span class="campo-obrigatorio">*</span></label>
                                <input type="text" name="modelo" id="modelo" class="block" placeholder="Digite o madelo do carro" minlength="1" maxlength="30" required>
                </div>
                <div class="caixaInputs"></div>
                            <label for="marca">Marca
                                <span class="campo-obrigatorio">*</span></label>
                                <input type="text" name="marca" id="marca" class="block" placeholder="Digite a marca do carro" minlength="1" maxlength="30" required>
                </div>
                <div class="caixaInputs"></div>
                            <label for="kilometragem">Kilometragem
                                <span class="campo-obrigatorio">*</span></label>
                                <input type="number" name="kilometragem" id="kilometragem" class="block" placeholder="Digite a Kilometragem" minlength="1" maxlength="30" required>
                </div>
                <div class="caixaInputs"></div>
                            <label for="ano">Ano
                                <span class="campo-obrigatorio">*</span></label>
                                <input type="date" name="ano" id="ano" class="block" minlength="1" maxlength="30" required>
                </div>
               <div class="caixaInput">
                            <p>Tipo de Cambio</p>
                            <span class="campo-obrigatorio">*</span>
                            <input type="radio" name="marcha" id="auto">
                            <label for="auto">Automático</label>
                            <span class="campo-obrigatorio">*</span>
                            <input type="radio" name="marcha" id="manual">
                            <label for="manual">Manual</label>
               </div>
             </form>
        </div>
                
    </div>
</body>
</html>
